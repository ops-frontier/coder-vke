# oauth2-proxy を GitHub プロバイダで構成する
# GH_CLIENT_ID / GH_CLIENT_SECRET / OAUTH2_PROXY_COOKIE_SECRET は
# helm/oauth2-proxy/templates/secret.yaml の Secret から読み込む

config:
  existingSecret: oauth2-proxy-credentials

extraArgs:
  - --provider=github
  - --github-org=${GH_ORGANIZATION}
  - --email-domain=*
  - --upstream=file:///dev/null
  - --http-address=0.0.0.0:4180
  - --redirect-url=https://auth.${DOMAIN}/oauth2/callback
  - --cookie-secure=true
  - --cookie-name=_oauth2_proxy
  - --cookie-domain=.${DOMAIN}
  - --set-xauthrequest=true
  - --pass-access-token=false
  - --skip-provider-button=true

ingress:
  enabled: true
  className: nginx
  path: /oauth2
  pathType: Prefix
  hosts:
    - auth.${DOMAIN}
  tls:
    - secretName: oauth2-proxy-tls
      hosts:
        - auth.${DOMAIN}
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-${LE_ENVIRONMENT}"

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

metrics:
  enabled: false
