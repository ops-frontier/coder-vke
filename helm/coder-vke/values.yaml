# ArgoCD App of Apps グローバル設定
# deploy.sh で --set により上書きされる

# ArgoCD Application が参照するデプロイ先クラスタ
destination:
  server: https://kubernetes.default.svc

# グローバル設定 (deploy.sh から --set で渡す)
domain: ""             # 必須: DigitalOcean DNS に委任されたドメイン (例: v2v.chip-in.net)
ghOrganization: "chip-in-v2"
leEnvironment: "production"
