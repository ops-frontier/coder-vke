{{- if .Values.domain }}
---
# coder-workspaces Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: coder-workspaces
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
# Coder がワークスペースリソースを管理するための Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coder-workspace-manager
  namespace: coder-workspaces
  annotations:
    argocd.argoproj.io/sync-wave: "6"
rules:
  - apiGroups: ["", "apps", "networking.k8s.io"]
    resources:
      - pods
      - deployments
      - replicasets
      - services
      - ingresses
      - persistentvolumeclaims
      - secrets
      - configmaps
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coder-workspace-manager
  namespace: coder-workspaces
  annotations:
    argocd.argoproj.io/sync-wave: "6"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: coder-workspace-manager
subjects:
  - kind: ServiceAccount
    name: coder
    namespace: coder
---
# ワイルドカード TLS 証明書 (全ワークスペースで共有)
# Let's Encrypt レート制限を防ぐためワークスペースごとに個別発行しない
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-tls
  namespace: coder-workspaces
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  secretName: wildcard-tls
  dnsNames:
    - "*.{{ .Values.domain }}"
  issuerRef:
    name: letsencrypt-{{ .Values.leEnvironment }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
