apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: "^4.0.0"
    helm:
      values: |
        controller:
          replicaCount: 2
          kind: DaemonSet
          service:
            type: LoadBalancer
            externalTrafficPolicy: Local
          allowSnippetAnnotations: true
          admissionWebhooks:
            enabled: false
          extraArgs:
            default-ssl-certificate: "ingress-nginx/default-tls-secret"
          config:
            ssl-reject-handshake: "true"
          metrics:
            enabled: false
        defaultBackend:
          enabled: true
  destination:
    server: {{ .Values.destination.server }}
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
