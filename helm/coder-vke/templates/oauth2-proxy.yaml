{{- if .Values.domain }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oauth2-proxy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://oauth2-proxy.github.io/manifests
    chart: oauth2-proxy
    targetRevision: "^7.0.0"
    helm:
      values: |
        config:
          existingSecret: oauth2-proxy-credentials
        extraArgs:
          - --provider=github
          - --github-org={{ .Values.ghOrganization }}
          - --email-domain=*
          - --upstream=file:///dev/null
          - --http-address=0.0.0.0:4180
          - --redirect-url=https://auth.{{ .Values.domain }}/oauth2/callback
          - --cookie-secure=true
          - --cookie-name=_oauth2_proxy
          - --cookie-domain=.{{ .Values.domain }}
          - --set-xauthrequest=true
          - --pass-access-token=false
          - --skip-provider-button=true
        ingress:
          enabled: true
          className: nginx
          path: /oauth2
          pathType: Prefix
          hosts:
            - auth.{{ .Values.domain }}
          tls:
            - secretName: oauth2-proxy-tls
              hosts:
                - auth.{{ .Values.domain }}
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-{{ .Values.leEnvironment }}
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        metrics:
          enabled: false
  destination:
    server: {{ .Values.destination.server }}
    namespace: oauth2-proxy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
