{{- if .Values.domain }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: "1.14.5"
    helm:
      values: |
        provider:
          name: digitalocean
        sources:
          - ingress
        domainFilters:
          - {{ .Values.domain | quote }}
        env:
          - name: DO_TOKEN
            valueFrom:
              secretKeyRef:
                name: digitalocean-token
                key: access-token
        policy: upsert-only
        txtOwnerId: "coder-vke"
        txtPrefix: "edns-"
        managedRecordTypes:
          - A
          - TXT
        interval: 1m
  destination:
    server: {{ .Values.destination.server }}
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
