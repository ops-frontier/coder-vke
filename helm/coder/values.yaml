coder:
  env:
    # PostgreSQL 接続 URL (deploy.sh で環境変数から生成して渡す)
    - name: CODER_PG_CONNECTION_URL
      valueFrom:
        secretKeyRef:
          name: coder-db-url
          key: url

    # 公開 URL
    - name: CODER_ACCESS_URL
      value: "https://coder.${DOMAIN}"

    # GitHub OAuth 認証
    - name: CODER_OAUTH2_GITHUB_ALLOW_SIGNUPS
      value: "true"
    - name: CODER_OAUTH2_GITHUB_ALLOWED_ORGS
      value: "${GH_ORGANIZATION}"
    - name: CODER_OAUTH2_GITHUB_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: coder-github-oauth
          key: client-id
    - name: CODER_OAUTH2_GITHUB_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: coder-github-oauth
          key: client-secret

    # GitHub 外部認証 (テンプレートで git clone するため repo スコープを追加)
    - name: CODER_EXTERNAL_AUTH_0_ID
      value: "github"
    - name: CODER_EXTERNAL_AUTH_0_TYPE
      value: "github"
    - name: CODER_EXTERNAL_AUTH_0_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: coder-github-oauth
          key: client-id
    - name: CODER_EXTERNAL_AUTH_0_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: coder-github-oauth
          key: client-secret
    - name: CODER_EXTERNAL_AUTH_0_SCOPES
      value: "read:user,user:email,repo"
    - name: CODER_EXTERNAL_AUTH_0_DISPLAY_NAME
      value: "GitHub"

  ingress:
    enable: true
    className: "nginx"
    host: "coder.${DOMAIN}"
    wildcardHost: "*.coder.${DOMAIN}"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-${LE_ENVIRONMENT}"
    tls:
      enable: true
      secretName: coder-tls-secret
    wildcardTLS:
      enable: true
      secretName: coder-wildcard-tls-secret

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
